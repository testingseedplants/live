        .option-item input { width: 20px; height: 20px; margin: 0; accent-color: #2e7d32; }
        .option-item label { margin: 0; font-weight: normal; cursor: pointer; flex: 1; font-size: 1rem; }
        .feedback-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 2000; animation: fadeIn 0.3s ease; }
        .feedback-card { background: white; border-radius: 60px; padding: 2rem 3rem; text-align: center; min-width: 320px; animation: slideUp 0.3s ease; }

    async function saveResultToFirebase(studentName, score, total, percentage, answersDetail) {
        try {
            await db.collection("exam_results").doc(studentName).set({
                studentName, score, total, percentage, answers: answersDetail,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            return true;
        } catch(e) { console.error(e); return false; }
    }
    async function loadResultsFromFirebase() {
        try {
            const snap = await db.collection("exam_results").orderBy("timestamp", "desc").get();
            return snap.docs.map(doc => doc.data());
        } catch(e) { console.error(e); return []; }
    }
    async function resetAllResultsFirebase(password) {
        if (password !== "226688") return false;
        try {
            const snap = await db.collection("exam_results").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            return true;
        } catch(e) { console.error(e); return false; }
    }

    // لتوفير المساحة، استخدمي نفس الأسئلة التي كانت لديك سابقاً.
    // سأضع نموذجاً مختصراً، لكن يمكنك لصق الأسئلة الكاملة من الكود القديم.
    function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
    function shuffleOptionsWithAllLast(o){let i=o.findIndex(opt=>opt==="جميع ما سبق"),rest=[...o],all=null;if(i!==-1){all=rest[i];rest=rest.filter((_,idx)=>idx!==i)}for(let i=rest.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[rest[i],rest[j]]=[rest[j],rest[i]]}if(all)rest.push(all);return rest;}
    function selectRandomQuestions(){const mcq=shuffleArray([...MCQ_BANK]).slice(0,4).map(q=>({...q,type:"mcq",options:shuffleOptionsWithAllLast([...q.options])}));const tf=shuffleArray([...TF_BANK]).slice(0,2).map(q=>({...q,type:"tf"}));return[...mcq,...tf];}

    // نظام الصوتيات (اختصار)
    let currentAudio=null;
    function playSound(file,vol=0.6){if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}const a=new Audio(file);a.volume=vol;currentAudio=a;a.play().catch(e=>console.log("صوت غير متاح",file));}

    const playFailSound=()=>playSound("Sound/fail.mp3",0.7);
    const playWarningSound=()=>playSound("Sound/warning.mp3",0.6);
    const playTimeoutSound=()=>playSound("Sound/timeout.mp3",0.7);

    // ======================= منطق الاختبار (نفس الكود القديم) =======================
    let appState = {
        stage:"nameEntry", studentName:"", questions:[], currentQuestionIndex:0, answers:[], score:0,
        showFeedback:false, feedbackType:null, selectedOptionValue:null, timer:null, timeLeft:40,
        timerActive:false, timeoutTriggered:false, warningPlayed30:false, warningPlayed10:false
    };
    function stopTimer(){if(appState.timer){clearInterval(appState.timer);appState.timer=null;}appState.timerActive=false;}
    function updateTimerDisplay(){
        const txt=document.querySelector('.timer-text'), prog=document.querySelector('.timer-progress');
        if(txt){txt.textContent=appState.timeLeft;
            if(appState.timeLeft<=10){txt.classList.add('danger');txt.classList.remove('warning');if(prog){prog.classList.add('danger');prog.classList.remove('warning');}
                const circ=document.querySelector('.circular-timer');if(circ&&appState.timeLeft<=5&&appState.timeLeft>0){circ.classList.add('timer-shake');setTimeout(()=>circ.classList.remove('timer-shake'),300);}
            }else if(appState.timeLeft<=20){txt.classList.add('warning');txt.classList.remove('danger');if(prog){prog.classList.add('warning');prog.classList.remove('danger');}
            }else{txt.classList.remove('warning','danger');if(prog){prog.classList.remove('warning','danger');}}
        }if(prog){const c=2*Math.PI*45;const off=c*(1-appState.timeLeft/40);prog.style.strokeDashoffset=off;}
    }
    function startTimer(){
        stopTimer();appState.timeLeft=40;appState.timerActive=true;appState.timeoutTriggered=false;appState.warningPlayed30=false;appState.warningPlayed10=false;
        playCountdownStart();
        appState.timer=setInterval(()=>{
            if(!appState.timerActive||appState.showFeedback)return;
            appState.timeLeft--;updateTimerDisplay();
            if(appState.timeLeft===30&&!appState.warningPlayed30){playCountdownStart();appState.warningPlayed30=true;}
            if(appState.timeLeft===10&&!appState.warningPlayed10){playWarningSound();appState.warningPlayed10=true;}
            if(appState.timeLeft<=0){
                stopTimer();
                if(!appState.timeoutTriggered&&!appState.showFeedback){
                    appState.timeoutTriggered=true;appState.feedbackType="timeout";appState.showFeedback=true;playTimeoutSound();render();
                }
            }
        },1000);
    }
    function render(){
        const cont=document.getElementById("dynamicContent");
        if(appState.stage==="nameEntry"){cont.innerHTML=renderNameEntry();attachNameEntryEvents();}
        else if(appState.stage==="instructions"){cont.innerHTML=renderInstructions();attachInstructionsEvents();}
        else if(appState.stage==="exam"){
            if(appState.showFeedback){cont.innerHTML=renderFeedback();attachFeedbackEvents();}
            else{cont.innerHTML=renderCurrentQuestion();attachQuestionEvents();startTimer();}
        }else if(appState.stage==="result"){cont.innerHTML=renderResult();}
    }
    function renderNameEntry(){return `<div class="panorama-image"><img src="IMG/01.jpg" onerror="this.style.display='none'"></div><h1>📝 الاختبار الختامي - النباتات البذرية</h1><div class="input-group"><label>✨ اسم الطالبة بالكامل:</label><input type="text" id="studentNameInput" placeholder="مثال: نورة سعود" autocomplete="off"></div><button id="startExamBtn">▶ دخول الاختبار</button>`;}
    function attachNameEntryEvents(){document.getElementById("startExamBtn").onclick=()=>{let name=document.getElementById("studentNameInput").value.trim();if(!name){alert("❌ الرجاء إدخال اسم الطالبة");return;}appState.studentName=name;appState.questions=selectRandomQuestions();appState.currentQuestionIndex=0;appState.answers=[];appState.score=0;appState.showFeedback=false;appState.stage="instructions";render();};}
    function renderInstructions(){return `<h1>📖 تعليمات الاختبار</h1><div class="instructions-box"><p>🔹 يتكون الاختبار من <strong>6 أسئلة</strong>:</p><ul><li>4 أسئلة اختيار من متعدد</li><li>2 سؤال صح/خطأ</li></ul><p>⏱️ <strong>مؤقت لكل سؤال: 40 ثانية</strong></p><p>🔹 درجة النجاح: <strong>50%</strong></p></div><button id="startExamFromInstBtn">🚀 بدء الاختبار</button>`;}
    function attachInstructionsEvents(){document.getElementById("startExamFromInstBtn").onclick=()=>{appState.stage="exam";render();};}
    function selectOption(value,el){document.querySelectorAll('.option-item').forEach(i=>i.classList.remove('selected'));el.classList.add('selected');appState.selectedOptionValue=value;const radio=el.querySelector('input');if(radio)radio.checked=true;}
    function renderCurrentQuestion(){
        const q=appState.questions[appState.currentQuestionIndex], qNum=appState.currentQuestionIndex+1, total=appState.questions.length;
        let opts='';
        if(q.type==="mcq"){opts=q.options.map(opt=>`<div class="option-item" onclick="window.selectOptionFn('${opt.replace(/'/g,"\\'").replace(/"/g,'&quot;')}',this)"><input type="radio" name="question" value="${opt.replace(/"/g,'&quot;')}"><label>${opt}</label></div>`).join('');}
        else{opts=`<div class="option-item" onclick="window.selectOptionFn('صحيح',this)"><input type="radio" name="question" value="صحيح"><label>✅ صحيح</label></div><div class="option-item" onclick="window.selectOptionFn('خطأ',this)"><input type="radio" name="question" value="خطأ"><label>❌ خطأ</label></div>`;}
        const imgHtml=q.image?`<div class="question-image"><img src="${q.image}" onerror="this.style.display='none'"></div>`:'';
        const circ=2*Math.PI*45;
        return `<div class="progress-bar"><div class="progress-fill" style="width:${(appState.currentQuestionIndex/total)*100}%"></div></div>
        <div class="question-window"><div class="timer-container"><div class="circular-timer"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" class="timer-bg" stroke="#e0e0e0" stroke-width="8" fill="none"/><circle cx="50" cy="50" r="45" class="timer-progress" stroke="#4caf50" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"/></svg><div class="timer-text">40</div></div></div>
        <div class="question-text">السؤال ${qNum} من ${total}<br>${q.text}</div>${imgHtml}<div class="options">${opts}</div><button id="submitAnswerBtn">✓ تأكيد الإجابة</button></div>`;
    }
    function attachQuestionEvents(){document.getElementById("submitAnswerBtn").onclick=()=>{if(!appState.selectedOptionValue){alert("❌ الرجاء اختيار إجابة");return;}stopTimer();if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}const cur=appState.questions[appState.currentQuestionIndex];const correct=(appState.selectedOptionValue===cur.correct);if(correct){appState.score++;appState.feedbackType="correct";playCorrectSound();}else{appState.feedbackType="wrong";playWrongSound();}appState.answers[appState.currentQuestionIndex]=appState.selectedOptionValue;appState.showFeedback=true;appState.selectedOptionValue=null;render();};window.selectOptionFn=selectOption;}
    function renderFeedback(){
        let title,msg;
        if(appState.feedbackType==="correct"){const m=["احسنتي! 🎉","رائع! 🌟","ممتاز! 💪"];title="✓ إجابة صحيحة";msg=m[Math.floor(Math.random()*m.length)];}
        else if(appState.feedbackType==="wrong"){const m=["للأسف إجابة خاطئة 📚","ليس صحيحاً، حاولي التركيز 💡","إجابة غير صحيحة، راجعي الدرس 📖"];title="✗ إجابة خاطئة";msg=m[Math.floor(Math.random()*m.length)];}
        else{const m=["⏰ انتهى الوقت!","⌛ للأسف لم تتمكني من الإجابة في الوقت المحدد","🕐 المرة القادمة انتبهي للوقت"];title="⌛ انتهاء الوقت";msg=m[Math.floor(Math.random()*m.length)];}
        return `<div class="feedback-overlay" id="feedbackOverlay"><div class="feedback-card ${appState.feedbackType}"><h3>${title}</h3><p>${msg}</p><button class="next-btn" id="nextQuestionBtn">▶ التالي</button></div></div>`;
    }
    function attachFeedbackEvents(){
        document.getElementById("nextQuestionBtn").onclick=async()=>{
            if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}
            appState.showFeedback=false;appState.currentQuestionIndex++;
            if(appState.currentQuestionIndex>=appState.questions.length){
                const total=appState.questions.length, perc=Math.round((appState.score/total)*100);
                const answersDetail={};appState.questions.forEach((q,i)=>{answersDetail[i]={question:q.text,userAnswer:appState.answers[i]||"انتهى الوقت",correctAnswer:q.correct};});
                const saved=await saveResultToFirebase(appState.studentName,appState.score,total,perc,answersDetail);
                if(!saved)alert("⚠️ حدث خطأ في حفظ النتيجة، لكن سيتم عرض نتيجتك.");
                if(perc>=50)playSuccessSound();else playFailSound();
                appState.stage="result";render();
            }else{appState.selectedOptionValue=null;render();}
        };
    }
    function renderResult(){
        const total=appState.questions.length, perc=Math.round((appState.score/total)*100);
        return `<h1>🎉 نتيجة الاختبار الختامي</h1><div class="result-area"><p><strong>الطالبة:</strong> ${appState.studentName}</p><p><strong>الدرجة النهائية:</strong> ${appState.score}/${total}</p><div class="score-badge">${perc}%</div><p>${perc>=50?"✅ مبروك! اجتياز موفق 🌟":"📚 دون المستوى، تحتاج مراجعة 💪"}</p></div><div class="footer-note">✅ تم حفظ نتيجتك في سجل المعلمة المركزي.</div>`;
    }
    async function refreshTeacherModal(){
        const cont=document.getElementById("teacherResultsList");
        if(!cont)return;cont.innerHTML='<div class="loading">⏳ جاري التحميل...</div>';
        const results=await loadResultsFromFirebase();
        if(results.length===0){cont.innerHTML="<p>📭 لا توجد نتائج بعد.</p>";return;}
        let html=`<div><strong>📊 عدد الطالبات: ${results.length}</strong></div>`;
        results.forEach(r=>{html+=`<div class="student-result-item"><div><strong>${r.studentName}</strong> - ${r.timestamp?.toDate?r.timestamp.toDate().toLocaleString('ar-EG'):new Date(r.timestamp).toLocaleString('ar-EG')}</div><div>⭐ ${r.score}/${r.total} (${r.percentage}%) <span class="${r.percentage>=50?'teacher-pass':'teacher-fail'}">${r.percentage>=50?"ناجحة":"دون المستوى"}</span></div></div>`;});
        cont.innerHTML=html;
    }
    function openTeacherModal(){const pwd=prompt("🔐 كلمة المرور:");if(pwd==="226688"){document.getElementById("teacherModal").style.display="flex";refreshTeacherModal();}else alert("❌ كلمة مرور خاطئة");}
    async function resetAll(){const pwd=prompt("🔐 تأكيد كلمة المرور لحذف جميع النتائج:");if(pwd==="226688"){const ok=await resetAllResultsFirebase(pwd);if(ok){alert("✅ تم إعادة الضبط");refreshTeacherModal();}else alert("❌ فشل إعادة الضبط");}else alert("❌ كلمة المرور غير صحيحة");}
    function bindEvents(){
        document.getElementById("teacherDashboardBtn").onclick=openTeacherModal;
        document.getElementById("closeModalBtn").onclick=()=>document.getElementById("teacherModal").style.display="none";
        document.getElementById("refreshTeacherView").onclick=refreshTeacherModal;
        document.getElementById("resetAllResultsBtn").onclick=resetAll;
        window.onclick=e=>{if(e.target===document.getElementById("teacherModal"))document.getElementById("teacherModal").style.display="none";};
    }
    function init(){render();bindEvents();}
    init();
</script>
</body>
</html>
