<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الاختبار الختامي - النباتات البذرية</title>
    <style>
        /* جميع الأنماط السابقة - اختصاراً سأضع الأنماط الأساسية هنا */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 850px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .content-pane { padding: 2rem; }
        h1 {
            font-size: 1.8rem;
            color: #1e3c72;
            border-right: 6px solid #2e7d32;
            padding-right: 1rem;
            margin-bottom: 1.5rem;
        }
        .panorama-image {
            width: 100%;
            height: 180px;
            overflow: hidden;
            border-radius: 32px;
            margin-bottom: 1.5rem;
        }
        .panorama-image img { width: 100%; height: 100%; object-fit: cover; }
        .input-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1f3a64;
        }
        input, button {
            width: 100%;
            padding: 14px 20px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        }
        button {
            background: #2e7d32;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #1b5e20; transform: scale(0.98); }
        .instructions-box {
            background: #fef9e6;
            padding: 1.5rem;
            border-radius: 32px;
            margin: 1rem 0;
            border-right: 5px solid #2e7d32;
            line-height: 1.7;
        }
        .question-window {
            background: white;
            border-radius: 32px;
            padding: 1.8rem;
            margin-bottom: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #e9eef3;
        }
        .timer-container { display: flex; justify-content: center; margin-bottom: 1.5rem; }
        .circular-timer {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .circular-timer svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        .timer-bg {
            stroke: #e0e0e0;
            stroke-width: 8;
            fill: none;
        }
        .timer-progress {
            stroke: #4caf50;
            stroke-width: 8;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }
        .timer-progress.warning { stroke: #ff9800; }
        .timer-progress.danger { stroke: #f44336; }
        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        .timer-text.warning { color: #ff9800; }
        .timer-text.danger { color: #f44336; animation: pulse 0.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        .question-text {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #0a2b44;
        }
        .question-image { text-align: center; margin: 1rem 0; }
        .question-image img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 20px;
            object-fit: cover;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: #f8fafc;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #e2e8f0;
        }
        .option-item:hover {
            background: #e8f5e9;
            border-color: #2e7d32;
            transform: scale(1.02);
        }
        .option-item.selected {
            background: #2e7d32;
            border-color: #2e7d32;
        }
        .option-item.selected label { color: white; }
        .option-item input {
            width: 20px;
            height: 20px;
            margin: 0;
            cursor: pointer;
        }
        .option-item label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
            flex: 1;
            font-size: 1rem;
        }
        .feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }
        .feedback-card {
            background: white;
            border-radius: 60px;
            padding: 2rem 3rem;
            text-align: center;
            min-width: 320px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        .feedback-card.correct {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            border: 3px solid #2e7d32;
        }
        .feedback-card.wrong {
            background: linear-gradient(135deg, #feb2b2 0%, #ff6b6b 100%);
            border: 3px solid #c62828;
        }
        .feedback-card.timeout {
            background: linear-gradient(135deg, #ffb347 0%, #ff6b6b 100%);
            border: 3px solid #e67e22;
        }
        .feedback-card h3 { font-size: 2rem; margin-bottom: 1rem; }
        .feedback-card p { font-size: 1.2rem; margin-bottom: 1.5rem; }
        .next-btn {
            background: #1e3c72;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.1rem;
            border: none;
            color: white;
            cursor: pointer;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .result-area {
            background: linear-gradient(135deg, #e8f0ff, #d4e0f5);
            border-radius: 40px;
            padding: 2rem;
            text-align: center;
        }
        .score-badge { font-size: 3rem; font-weight: 800; color: #1e6f3f; }
        .teacher-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }
        .teacher-btn {
            background: #2c3e66;
            width: auto;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            border: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            max-width: 850px;
            width: 90%;
            max-height: 85vh;
            border-radius: 48px;
            padding: 1.8rem;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            left: 20px;
            top: 20px;
            font-size: 28px;
            cursor: pointer;
            background: #e2e8f0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .student-result-item {
            border-bottom: 1px solid #ddd;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .teacher-pass { color: green; font-weight: bold; }
        .teacher-fail { color: #b91c1c; font-weight: bold; }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 20px;
            height: 10px;
            margin: 1rem 0;
        }
        .progress-fill {
            background: #2e7d32;
            border-radius: 20px;
            height: 100%;
            transition: width 0.3s;
        }
        .footer-note {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 20px;
            color: #5f6c80;
        }
        .page-footer {
            text-align: center;
            padding: 1rem 0 0.8rem;
            border-top: 1px solid #e2e8f0;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 500;
            background: white;
        }
        .page-footer span { color: #2e7d32; font-weight: 600; }
        .loading { text-align: center; padding: 20px; color: #666; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2e7d32;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 4000;
            animation: slideIn 0.3s ease;
        }
        .toast.error { background: #c62828; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="container" id="appContainer">
    <div id="dynamicContent" class="content-pane"></div>
    <div class="page-footer">
        <span>✨</span> إعداد/ أ. شريفه الزهراني <span>✨</span>
    </div>
</div>

<div class="teacher-panel">
    <button id="teacherDashboardBtn" class="teacher-btn">📊 لوحة المعلمة</button>
</div>

<div id="teacherModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h2>📋 لوحة تحكم المعلمة - نتائج الطالبات</h2>
        <div id="teacherResultsList"><div class="loading">⏳ جاري تحميل النتائج...</div></div>
        <button id="refreshTeacherView" class="btn-secondary" style="margin-top: 10px;">تحديث النتائج 🔄</button>
        <button id="resetAllResultsBtn" style="background:#c0392b; margin-top: 10px;">🗑 إعادة ضبط جميع النتائج</button>
        <div style="margin-top: 15px; font-size: 12px; color: #666; text-align: center;">💾 البيانات مخزنة في Firebase Cloud</div>
    </div>
</div>

<script type="module">
    // استيراد دوال Firebase من ملف منفصل
    import { initFirebase, saveResultToFirebase, loadResultsFromFirebase, deleteAllResultsFromFirebase } from './firebase.js';
    
    // تهيئة Firebase
    initFirebase();
    
    // ======================= بنك الأسئلة =======================
    const MCQ_BANK = [ /* ... 35 سؤال ... */ ];
    const TF_BANK = [ /* ... 15 سؤال ... */ ];
    // (يجب نسخ الأسئلة من الكود السابق هنا)
    // لاختصار المساحة، أضع مثالاً بسيطاً – لكن يجب تضمين الأسئلة الكاملة كما في الكود الأصلي.
    // سأضيف الأسئلة كاملة في الكود النهائي.

    // دوال خلط الأسئلة والخيارات (نفس الكود السابق)
    function shuffleOptionsWithAllLast(options) { /* ... */ }
    function shuffleArray(arr) { /* ... */ }
    function selectRandomQuestions() { /* ... */ }

    // نظام الصوتيات (نفس الكود السابق)
    let currentPlayingAudio = null;
    function stopAllSounds() { if(currentPlayingAudio) { currentPlayingAudio.pause(); currentPlayingAudio.currentTime = 0; currentPlayingAudio = null; } }
    function playSound(soundFile, volume = 0.6) { try { stopAllSounds(); const audio = new Audio(soundFile); audio.volume = volume; currentPlayingAudio = audio; audio.play().catch(e => console.log("صوت غير متاح:", soundFile)); } catch(e) {} }
    function playCountdownStart() { playSound("Sound/countdown.mp3", 0.5); }
    function playCorrectSound() { playSound("Sound/correct.mp3", 0.7); }
    function playWrongSound() { playSound("Sound/wrong.mp3", 0.7); }
    function playSuccessSound() { playSound("Sound/success.mp3", 0.8); }
    function playFailSound() { playSound("Sound/fail.mp3", 0.7); }
    function playWarningSound() { playSound("Sound/warning.mp3", 0.6); }
    function playTimeoutSound() { playSound("Sound/timeout.mp3", 0.7); }

    // ======================= حالة التطبيق =======================
    let appState = {
        stage: "nameEntry",
        studentName: "",
        questions: [],
        currentQuestionIndex: 0,
        answers: [],
        score: 0,
        showFeedback: false,
        feedbackType: null,
        selectedOptionValue: null,
        timer: null,
        timeLeft: 40,
        timerActive: false
    };

    function stopTimer() {
        if(appState.timer) { clearInterval(appState.timer); appState.timer = null; }
        appState.timerActive = false;
    }

    function startTimer() {
        stopTimer();
        appState.timeLeft = 40;
        appState.timerActive = true;
        let warning30 = false, warning10 = false;
        playCountdownStart();
        appState.timer = setInterval(() => {
            if(!appState.timerActive || appState.showFeedback) return;
            appState.timeLeft--;
            updateTimerDisplay();
            if(appState.timeLeft === 30 && !warning30) { playCountdownStart(); warning30 = true; }
            if(appState.timeLeft === 10 && !warning10) { playWarningSound(); warning10 = true; }
            if(appState.timeLeft <= 0) {
                stopTimer();
                if(!appState.showFeedback) {
                    appState.feedbackType = "timeout";
                    appState.showFeedback = true;
                    playTimeoutSound();
                    render();
                }
            }
        }, 1000);
    }
    
    function updateTimerDisplay() {
        const timerText = document.querySelector('.timer-text');
        const timerProgress = document.querySelector('.timer-progress');
        if(timerText) timerText.textContent = appState.timeLeft;
        if(timerProgress) {
            const circumference = 2 * Math.PI * 45;
            const offset = circumference * (1 - appState.timeLeft / 40);
            timerProgress.style.strokeDashoffset = offset;
            if(appState.timeLeft <= 10) {
                timerProgress.classList.add('danger');
                timerProgress.classList.remove('warning');
                if(timerText) timerText.classList.add('danger');
            } else if(appState.timeLeft <= 20) {
                timerProgress.classList.add('warning');
                timerProgress.classList.remove('danger');
                if(timerText) timerText.classList.add('warning');
            } else {
                timerProgress.classList.remove('warning', 'danger');
                if(timerText) timerText.classList.remove('warning', 'danger');
            }
        }
    }

    // دوال العرض (render)
    function render() {
        const container = document.getElementById("dynamicContent");
        if(appState.stage === "nameEntry") {
            container.innerHTML = renderNameEntry();
            document.getElementById("startExamBtn").addEventListener("click", startExam);
        } else if(appState.stage === "instructions") {
            container.innerHTML = renderInstructions();
            document.getElementById("startExamFromInstBtn").addEventListener("click", () => {
                appState.stage = "exam";
                render();
            });
        } else if(appState.stage === "exam") {
            if(appState.showFeedback) {
                container.innerHTML = renderFeedback();
                document.getElementById("nextQuestionBtn").addEventListener("click", nextQuestion);
            } else {
                container.innerHTML = renderCurrentQuestion();
                document.getElementById("submitAnswerBtn").addEventListener("click", submitAnswer);
                document.querySelectorAll('.option-item').forEach(el => {
                    el.addEventListener("click", () => {
                        const value = el.getAttribute("data-value");
                        selectOption(value, el);
                    });
                });
                startTimer();
            }
        } else if(appState.stage === "result") {
            container.innerHTML = renderResult();
        }
    }

    function startExam() {
        const name = document.getElementById("studentNameInput").value.trim();
        if(!name) { alert("❌ الرجاء إدخال اسم الطالبة"); return; }
        appState.studentName = name;
        appState.questions = selectRandomQuestions();
        appState.currentQuestionIndex = 0;
        appState.answers = [];
        appState.score = 0;
        appState.showFeedback = false;
        appState.stage = "instructions";
        render();
    }

    function selectOption(value, element) {
        document.querySelectorAll('.option-item').forEach(item => item.classList.remove('selected'));
        element.classList.add('selected');
        appState.selectedOptionValue = value;
        const radio = element.querySelector('input');
        if(radio) radio.checked = true;
    }

    function submitAnswer() {
        if(!appState.selectedOptionValue) { alert("❌ الرجاء اختيار إجابة"); return; }
        stopTimer();
        stopAllSounds();
        const currentQ = appState.questions[appState.currentQuestionIndex];
        const isCorrect = (appState.selectedOptionValue === currentQ.correct);
        if(isCorrect) { appState.score++; appState.feedbackType = "correct"; playCorrectSound(); }
        else { appState.feedbackType = "wrong"; playWrongSound(); }
        appState.answers[appState.currentQuestionIndex] = appState.selectedOptionValue;
        appState.showFeedback = true;
        appState.selectedOptionValue = null;
        render();
    }

    async function nextQuestion() {
        console.log("nextQuestion: قبل الزيادة", appState.currentQuestionIndex);
        stopAllSounds();
        appState.showFeedback = false;
        appState.currentQuestionIndex++;
        console.log("nextQuestion: بعد الزيادة", appState.currentQuestionIndex);
        if(appState.currentQuestionIndex >= appState.questions.length) {
            // نهاية الاختبار
            const total = appState.questions.length;
            const percentage = Math.round((appState.score / total) * 100);
            const answersDetail = {};
            appState.questions.forEach((q, idx) => {
                answersDetail[idx] = { question: q.text, userAnswer: appState.answers[idx] || "انتهى الوقت", correctAnswer: q.correct };
            });
            // حفظ في Firebase
            await saveResultToFirebase(appState.studentName, appState.score, total, percentage, answersDetail);
            if(percentage >= 50) playSuccessSound(); else playFailSound();
            appState.stage = "result";
            render();
        } else {
            appState.selectedOptionValue = null;
            render();
        }
    }

    // وظائف العرض (HTML)
    function renderNameEntry() {
        return `
            <div class="panorama-image"><img src="IMG/01.jpg" alt="بانوراما" onerror="this.style.display='none'"></div>
            <h1>📝 الاختبار الختامي - النباتات البذرية</h1>
            <div class="input-group">
                <label>✨ اسم الطالبة بالكامل:</label>
                <input type="text" id="studentNameInput" placeholder="مثال: نورة سعود">
            </div>
            <button id="startExamBtn">▶ دخول الاختبار</button>
        `;
    }

    function renderInstructions() {
        return `
            <h1>📖 تعليمات الاختبار</h1>
            <div class="instructions-box">
                <p>🔹 يتكون الاختبار من <strong>6 أسئلة</strong> (4 اختيار من متعدد + 2 صح/خطأ)</p>
                <p>⏱️ <strong>مؤقت لكل سؤال: 40 ثانية</strong></p>
                <p>💾 <strong>النتائج تحفظ تلقائياً في Firebase Cloud</strong></p>
                <p>🔹 درجة النجاح: <strong>50%</strong></p>
            </div>
            <button id="startExamFromInstBtn">🚀 بدء الاختبار</button>
        `;
    }

    function renderCurrentQuestion() {
        const q = appState.questions[appState.currentQuestionIndex];
        const qNum = appState.currentQuestionIndex + 1;
        const total = appState.questions.length;
        const circumference = 2 * Math.PI * 45;
        let optionsHtml = '';
        if(q.type === "mcq") {
            optionsHtml = q.options.map(opt => `
                <div class="option-item" data-value="${opt.replace(/"/g, '&quot;')}">
                    <input type="radio" name="question" value="${opt.replace(/"/g, '&quot;')}">
                    <label>${opt}</label>
                </div>
            `).join('');
        } else {
            optionsHtml = `
                <div class="option-item" data-value="صحيح"><input type="radio" name="question" value="صحيح"><label>✅ صحيح</label></div>
                <div class="option-item" data-value="خطأ"><input type="radio" name="question" value="خطأ"><label>❌ خطأ</label></div>
            `;
        }
        const imageHtml = q.image ? `<div class="question-image"><img src="${q.image}" onerror="this.style.display='none'"></div>` : '';
        return `
            <div class="progress-bar"><div class="progress-fill" style="width: ${(appState.currentQuestionIndex / total) * 100}%"></div></div>
            <div class="question-window">
                <div class="timer-container">
                    <div class="circular-timer">
                        <svg viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" class="timer-bg" stroke="#e0e0e0" stroke-width="8" fill="none"/>
                            <circle cx="50" cy="50" r="45" class="timer-progress" stroke="#4caf50" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"/>
                        </svg>
                        <div class="timer-text">40</div>
                    </div>
                </div>
                <div class="question-text">السؤال ${qNum} من ${total}<br>${q.text}</div>
                ${imageHtml}
                <div class="options">${optionsHtml}</div>
                <button id="submitAnswerBtn">✓ تأكيد الإجابة</button>
            </div>
        `;
    }

    function renderFeedback() {
        let title = "", message = "";
        if(appState.feedbackType === "correct") {
            const msgs = ["احسنتي! 🎉", "رائع! 🌟", "ممتاز! 💪"];
            title = "✓ إجابة صحيحة";
            message = msgs[Math.floor(Math.random() * msgs.length)];
        } else if(appState.feedbackType === "wrong") {
            const msgs = ["للأسف إجابة خاطئة 📚", "ليس صحيحاً، حاولي التركيز 💡", "إجابة غير صحيحة، راجعي الدرس 📖"];
            title = "✗ إجابة خاطئة";
            message = msgs[Math.floor(Math.random() * msgs.length)];
        } else {
            const msgs = ["⏰ انتهى الوقت!", "⌛ لم تتمكني من الإجابة في الوقت المحدد", "🕐 المرة القادمة انتبهي للوقت"];
            title = "⌛ انتهاء الوقت";
            message = msgs[Math.floor(Math.random() * msgs.length)];
        }
        return `
            <div class="feedback-overlay" id="feedbackOverlay">
                <div class="feedback-card ${appState.feedbackType}">
                    <h3>${title}</h3>
                    <p>${message}</p>
                    <button class="next-btn" id="nextQuestionBtn">▶ التالي</button>
                </div>
            </div>
        `;
    }

    function renderResult() {
        const total = appState.questions.length;
        const percentage = Math.round((appState.score / total) * 100);
        return `
            <h1>🎉 نتيجة الاختبار الختامي</h1>
            <div class="result-area">
                <p><strong>الطالبة:</strong> ${appState.studentName}</p>
                <p><strong>الدرجة النهائية:</strong> ${appState.score} / ${total}</p>
                <div class="score-badge">${percentage}%</div>
                <p style="margin-top:12px;">${percentage >= 50 ? "✅ مبروك! اجتياز موفق 🌟" : "📚 دون المستوى، تحتاج مراجعة 💪"}</p>
            </div>
            <div class="footer-note">✅ تم حفظ نتيجتك في Firebase Cloud. يمكن للمعلمة الاطلاع عليها فوراً.</div>
        `;
    }

    // دوال لوحة المعلمة
    async function refreshTeacherModal() {
        const container = document.getElementById("teacherResultsList");
        if(!container) return;
        container.innerHTML = '<div class="loading">⏳ جاري تحميل النتائج...</div>';
        const results = await loadResultsFromFirebase();
        if(results.length === 0) { container.innerHTML = "<p>📭 لا توجد نتائج مسجلة بعد.</p>"; return; }
        let html = `<div style="margin-bottom: 15px;"><strong>📊 عدد الطالبات: ${results.length}</strong></div>`;
        results.forEach(res => {
            const passClass = res.percentage >= 50 ? "teacher-pass" : "teacher-fail";
            const status = res.percentage >= 50 ? "ناجحة" : "دون المستوى";
            const date = new Date(res.timestamp).toLocaleString('ar-EG');
            html += `<div class="student-result-item">
                        <div><strong>${res.studentName}</strong><br><small>${date}</small></div>
                        <div>⭐ ${res.score}/${res.total} (${res.percentage}%)<br><span class="${passClass}">${status}</span></div>
                    </div>`;
        });
        container.innerHTML = html;
    }

    function openTeacherModal() {
        const pwd = prompt("🔐 أدخل كلمة المرور:");
        if(pwd === "226688") {
            document.getElementById("teacherModal").style.display = "flex";
            refreshTeacherModal();
        } else alert("❌ كلمة المرور غير صحيحة!");
    }

    function bindGlobalEvents() {
        document.getElementById("teacherDashboardBtn").addEventListener("click", openTeacherModal);
        document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("teacherModal").style.display = "none");
        document.getElementById("refreshTeacherView").addEventListener("click", refreshTeacherModal);
        document.getElementById("resetAllResultsBtn").addEventListener("click", async () => {
            if(confirm("⚠️ هل أنت متأكدة من حذف جميع النتائج؟")) {
                await deleteAllResultsFromFirebase();
                refreshTeacherModal();
            }
        });
        window.onclick = (e) => { if(e.target === document.getElementById("teacherModal")) document.getElementById("teacherModal").style.display = "none"; };
    }

    function init() {
        render();
        bindGlobalEvents();
    }
    init();
</script>
</body>
</html>
