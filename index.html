<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الاختبار الختامي - النباتات البذرية</title>
    <style>
        /* التنسيقات كما هي لضمان المظهر الجميل */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem 1rem; }
        .container { max-width: 850px; width: 100%; background: white; border-radius: 48px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); overflow: hidden; padding: 2rem; }
        h1 { font-size: 1.8rem; color: #1e3c72; border-right: 6px solid #2e7d32; padding-right: 1rem; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1f3a64; }
        input, button { width: 100%; padding: 14px 20px; border-radius: 40px; border: 1px solid #cbd5e1; font-size: 1rem; }
        button { background: #2e7d32; color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 0.5rem; }
        .question-window { background: #f8fafc; border-radius: 32px; padding: 1.8rem; border: 1px solid #e2e8f0; }
        .option-item { background: white; padding: 14px 18px; border-radius: 60px; cursor: pointer; border: 2px solid #e2e8f0; margin-bottom: 10px; }
        .option-item.selected { background: #2e7d32; color: white; border-color: #2e7d32; }
        .feedback-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .feedback-card { background: white; border-radius: 40px; padding: 2.5rem; text-align: center; min-width: 300px; }
        .teacher-panel { position: fixed; bottom: 20px; left: 20px; }
        .teacher-btn { background: #2c3e66; width: auto; padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 600px; border-radius: 30px; padding: 2rem; max-height: 80vh; overflow-y: auto; }
        .score-badge { font-size: 3rem; color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="appContainer">
    <div id="dynamicContent"></div>
    <p style="text-align: center; margin-top: 20px; color: #666;">إعداد/ أ. شريفه الزهراني ✨</p>
</div>

<div class="teacher-panel">
    <button id="teacherDashboardBtn" class="teacher-btn">📊 لوحة المعلمة</button>
</div>

<div id="teacherModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px">📋 نتائج الطالبات (Firebase)</h2>
        <div id="resultsList">جاري التحميل...</div>
        <button onclick="document.getElementById('teacherModal').style.display='none'" style="background:#666; margin-top:20px">إغلاق</button>
    </div>
</div>

<script type="module">
    // استيراد Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBg3q3Xuh5c2_03snkKThBtR3sc80k-OW4",
        authDomain: "quiz-app-b0339.firebaseapp.com",
        projectId: "quiz-app-b0339",
        storageBucket: "quiz-app-b0339.firebasestorage.app",
        messagingSenderId: "798217786332",
        appId: "1:798217786332:web:742058458be31599123519"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // بنك الأسئلة المختصر للتجربة (يمكنك زيادتها)
    const QUESTIONS = [
        { text: "ما المقصود بالنباتات البذرية؟", options: ["نباتات لا تنتج بذور", "نباتات تتكاثر بالبذور", "نباتات تعيش في الماء"], correct: "نباتات تتكاثر بالبذور" },
        { text: "أي مما يلي مثال على نبات بذري؟", options: ["السرخس", "الطحلب", "القمح"], correct: "القمح" },
        { text: "الورقة هي الجزء المسؤول عن صنع الغذاء في النبات", options: ["صحيح", "خطأ"], correct: "صحيح" }
    ];

    let state = {
        name: "",
        currentIndex: 0,
        score: 0,
        selected: null,
        stage: "start" // start, quiz, feedback, result
    };

    function render() {
        const content = document.getElementById("dynamicContent");
        
        if (state.stage === "start") {
            content.innerHTML = `
                <h1>📝 اختبار النباتات البذرية</h1>
                <div class="input-group">
                    <label>اسم الطالبة:</label>
                    <input type="text" id="nameInp" placeholder="أدخلي اسمك...">
                </div>
                <button id="startBtn">بدء الاختبار</button>
            `;
            document.getElementById("startBtn").onclick = () => {
                const n = document.getElementById("nameInp").value;
                if(!n) return alert("ادخلي الاسم");
                state.name = n; state.stage = "quiz"; render();
            };
        } 
        
        else if (state.stage === "quiz") {
            const q = QUESTIONS[state.currentIndex];
            content.innerHTML = `
                <div class="question-window">
                    <p>سؤال ${state.currentIndex + 1} من ${QUESTIONS.length}</p>
                    <h2 style="margin: 15px 0">${q.text}</h2>
                    ${q.options.map(opt => `<div class="option-item ${state.selected === opt ? 'selected' : ''}" onclick="window.setOpt('${opt}')">${opt}</div>`).join('')}
                    <button id="nextBtn" style="margin-top:20px">تأكيد الإجابة</button>
                </div>
            `;
            document.getElementById("nextBtn").onclick = handleNext;
        }

        else if (state.stage === "feedback") {
            const isCorrect = state.lastCorrect;
            content.innerHTML = `
                <div class="feedback-overlay">
                    <div class="feedback-card">
                        <h2 style="color: ${isCorrect ? 'green' : 'red'}">${isCorrect ? 'إجابة صحيحة! 🎉' : 'إجابة خاطئة ❌'}</h2>
                        <button id="contBtn">التالي</button>
                    </div>
                </div>
            `;
            document.getElementById("contBtn").onclick = transitionNext;
        }

        else if (state.stage === "result") {
            content.innerHTML = `
                <div style="text-align:center">
                    <h1>انتهى الاختبار</h1>
                    <p>الطالبة: ${state.name}</p>
                    <div class="score-badge">${state.score} / ${QUESTIONS.length}</div>
                    <p>تم حفظ نتيجتك بنجاح ✅</p>
                    <button onclick="location.reload()">إعادة الاختبار</button>
                </div>
            `;
        }
    }

    window.setOpt = (val) => { state.selected = val; render(); };

    function handleNext() {
        if (!state.selected) return alert("اختاروا إجابة");
        const q = QUESTIONS[state.currentIndex];
        state.lastCorrect = (state.selected === q.correct);
        if (state.lastCorrect) state.score++;
        state.stage = "feedback";
        render();
    }

    // هذه هي الدالة التي كانت تسبب المشكلة (الانتقال من التغذية الراجعة للسؤال التالي أو النتيجة)
    async function transitionNext() {
        state.selected = null;
        if (state.currentIndex < QUESTIONS.length - 1) {
            state.currentIndex++;
            state.stage = "quiz";
            render();
        } else {
            // الوصول للسؤال الأخير -> حفظ ثم عرض النتيجة
            await saveResult();
            state.stage = "result";
            render();
        }
    }

    async function saveResult() {
        try {
            await push(ref(db, 'results'), {
                studentName: state.name,
                score: state.score,
                total: QUESTIONS.length,
                time: new Date().toLocaleString('ar-EG')
            });
        } catch (e) {
            console.error("Firebase Error:", e);
        }
    }

    // لوحة المعلمة
    document.getElementById("teacherDashboardBtn").onclick = () => {
        const p = prompt("كلمة المرور:");
        if(p === "226688") {
            document.getElementById("teacherModal").style.display = "flex";
            const resList = document.getElementById("resultsList");
            onValue(ref(db, 'results'), (snap) => {
                const data = snap.val();
                if(!data) return resList.innerHTML = "لا توجد نتائج";
                let html = "";
                Object.values(data).reverse().forEach(r => {
                    html += `<div style="border-bottom:1px solid #eee; padding:10px">
                        <b>${r.studentName}</b>: ${r.score}/${r.total} <br>
                        <small>${r.time}</small>
                    </div>`;
                });
                resList.innerHTML = html;
            });
        }
    };

    render();
</script>
</body>
</html>
